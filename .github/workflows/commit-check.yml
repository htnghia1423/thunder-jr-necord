name: Commit Message Check

on:
  push:
    branches:
      - '*'
  pull_request:
    branches: [main, dev]

jobs:
  check-commit:
    name: Check Commit Message Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        run: |
          # For PRs, check all commits in the PR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_RANGE="origin/${{ github.base_ref }}..HEAD"
          else
            # For direct push, check only the new commits
            COMMIT_RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          # Get all commit messages for checking, but skip merge commits
          COMMIT_MESSAGES=$(git log --no-merges --pretty=format:%s $COMMIT_RANGE)
          echo "Checking commit messages:"
          echo "$COMMIT_MESSAGES"

          # Check each commit message with commitlint
          echo "$COMMIT_MESSAGES" | while read -r COMMIT_MSG; do
            # Skip empty lines
            if [ -z "$COMMIT_MSG" ]; then
              continue
            fi

            echo "Checking commit message: $COMMIT_MSG"
            echo "$COMMIT_MSG" | bun commitlint || {
              echo "Commit message must follow conventional commit format: <type>: <description>"
              echo "Types: feat, fix, docs, style, refactor, test, chore, ci, add, update, remove"
              exit 1
            }
          done
