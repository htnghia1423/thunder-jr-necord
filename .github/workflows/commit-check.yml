name: Commit Message Check

on:
  push:
    branches:
      - '*'

jobs:
  check-commit:
    name: Check Commit Message Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        run: |
          # Get only the latest commit message when pushing
          if [ -n "${{ github.event.before }}" ] && [ -n "${{ github.event.after }}" ]; then
            # For normal push events
            COMMITS_TO_CHECK=$(git log --no-merges --format=%H ${{ github.event.before }}..${{ github.event.after }})
          else
            # If before/after aren't available, just check the latest commit
            COMMITS_TO_CHECK=$(git log -n 1 --no-merges --format=%H)
          fi

          echo "Commits to check:"
          echo "$COMMITS_TO_CHECK"

          # Check each commit
          EXIT_CODE=0
          for COMMIT_HASH in $COMMITS_TO_CHECK; do
            COMMIT_MSG=$(git log -n 1 --format=%s $COMMIT_HASH)
            
            # Skip PR merge commits
            if [[ "$COMMIT_MSG" =~ ^Merge\ pull\ request\ #[0-9]+\ from ]]; then
              echo "Skipping merge commit: $COMMIT_MSG"
              continue
            fi
            
            # Skip normal merge commits
            if [[ "$COMMIT_MSG" =~ ^Merge\ branch ]]; then
              echo "Skipping merge commit: $COMMIT_MSG"
              continue
            fi
            
            # Skip squashed PR commits that contain (#number)
            if [[ "$COMMIT_MSG" =~ .*\(#[0-9]+\)$ ]]; then
              echo "Skipping PR squash commit: $COMMIT_MSG"
              continue
            fi
            
            echo "Checking commit message: $COMMIT_MSG"
            echo "$COMMIT_MSG" | bun commitlint || {
              echo "Commit message must follow conventional commit format: <type>: <description>"
              echo "Types: feat, fix, docs, style, refactor, test, chore, ci, add, update, remove"
              EXIT_CODE=1
            }
          done

          exit $EXIT_CODE
