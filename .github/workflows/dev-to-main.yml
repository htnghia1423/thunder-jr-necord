name: Dev to Main PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Add permissions for writing to PR
permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    name: Validate PR from Dev to Main
    runs-on: ubuntu-latest
    # Only run for PRs from dev to main
    if: github.base_ref == 'main' && github.head_ref == 'dev'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun eslint "src/**/*.ts" --ext .ts

      - name: Check formatting with Prettier
        run: bun prettier --check "**/*.{ts,js,json,md,yml}"

      - name: Test
        env:
          NODE_ENV: test
          DISCORD_TOKEN: test-token
        run: bun test

      - name: Build
        run: bun run build

      - name: Comment PR
        if: success()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All checks have passed successfully. The dev branch is ready to be merged into main. Remember to create a version tag after merging.'
            })
