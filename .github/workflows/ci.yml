name: CI

on:
  push:
    branches: [main, dev, 'feature/*']
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $PR_TITLE"

          # Check if PR title follows the pattern
          if [[ $PR_TITLE =~ ^(feat|fix|docs|style|refactor|test|chore|add|update|remove):.+ ]]; then
            echo "PR title follows conventional commit format ✅"
          else
            echo "PR title must follow conventional commit format: <type>: <description>"
            echo "Types: feat, fix, docs, style, refactor, test, chore, add, update, remove"
            exit 1
          fi

      - name: Run ESLint
        run: bun eslint . --ext .ts

      - name: Check formatting with Prettier
        run: bun prettier --check "**/*.{ts,js,json,md,yml}"

      - name: Build
        run: bun run build
