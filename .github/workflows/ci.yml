name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        if: github.event_name == 'pull_request'
        run: |
          # Get all commit messages in the PR for checking, but skip merge commits
          COMMIT_MESSAGES=$(git log --no-merges --pretty=format:%s origin/${{ github.base_ref }}..HEAD)
          echo "Checking commit messages in the PR:"
          echo "$COMMIT_MESSAGES"

          # Check each commit message with commitlint
          echo "$COMMIT_MESSAGES" | while read -r COMMIT_MSG; do
            # Skip empty lines
            if [ -z "$COMMIT_MSG" ]; then
              continue
            fi
            
            echo "Checking commit message: $COMMIT_MSG"
            echo "$COMMIT_MSG" | bun commitlint || {
              echo "Commit message must follow conventional commit format: <type>: <description>"
              echo "Types: feat, fix, docs, style, refactor, test, chore, ci, add, update, remove"
              exit 1
            }
          done

      - name: Lint
        run: bun eslint "src/**/*.ts" --ext .ts --fix

      - name: Test with coverage
        env:
          NODE_ENV: test
          DISCORD_TOKEN: test-token
        run: bun run test:cov

      - name: List coverage files
        run: ls -la coverage/

      - name: Upload coverage reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

      # Make sure the coverage report is accessible in the workspace
      - name: Verify lcov.info exists
        run: |
          echo "Checking if coverage/lcov.info exists"
          if [ -f "coverage/lcov.info" ]; then
            echo "lcov.info exists"
            cat coverage/lcov.info | head -n 10
          else
            echo "lcov.info does not exist!"
            ls -la coverage/
            exit 1
          fi

      # Use the official action with correct options for code coverage analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Specify additional options to ensure correct configuration
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.module.ts
