name: CI

on:
  push:
    branches: [main, dev, 'feature/*']
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        if: github.event_name == 'pull_request'
        run: |
          # Lấy commit cuối cùng của PR để kiểm tra
          LATEST_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Checking last commit message: $LATEST_COMMIT_MSG"

          # Kiểm tra commit message qua commitlint
          echo "$LATEST_COMMIT_MSG" | bun commitlint || {
            echo "Commit message must follow conventional commit format: <type>: <description>"
            echo "Types: feat, fix, docs, style, refactor, test, chore, add, update, remove"
            exit 1
          }

      - name: Run ESLint
        run: bun eslint . --ext .ts

      - name: Check formatting with Prettier
        run: bun prettier --check "**/*.{ts,js,json,md,yml}"

      - name: Build
        run: bun run build
