name: CI

on:
  push:
    branches: [main, dev, 'feature/*']
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check commit message format
        if: github.event_name == 'pull_request'
        run: |
          # Lấy tất cả commit messages trong PR để kiểm tra
          COMMIT_MESSAGES=$(git log --pretty=%B origin/main..HEAD)
          echo "Checking commit messages in the PR:"
          echo "$COMMIT_MESSAGES"

          # Kiểm tra từng commit message qua commitlint
          echo "$COMMIT_MESSAGES" | while read -r COMMIT_MSG; do
            echo "Checking commit message: $COMMIT_MSG"
            echo "$COMMIT_MSG" | bun commitlint || {
              echo "Commit message must follow conventional commit format: <type>: <description>"
              echo "Types: feat, fix, docs, style, refactor, test, chore, add, update, remove"
              exit 1
            }
          done

      - name: Run ESLint
        run: bun eslint . --ext .ts

      - name: Check formatting with Prettier
        run: bun prettier --check "**/*.{ts,js,json,md,yml}"

      - name: Build
        run: bun run build
