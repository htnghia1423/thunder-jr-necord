sonar.projectKey=htnghia1423_thunder-jr-necord
sonar.organization=htnghia1423

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Thunder Jr Necord Bot
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file
sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/*.config.ts,**/*.module.ts

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# TypeScript specific configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Test coverage reports
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.module.ts

# Set to display coverage on new code
sonar.coverage.jacoco.xmlReportPaths=coverage/clover.xml 